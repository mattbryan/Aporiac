name: Sift
options:
  bundleIdPrefix: com.aporian
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""  # Set your Apple Developer Team ID here
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Sift:
    type: application
    platform: iOS
    bundleId: com.aporian.sift
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aporian.sift
        INFOPLIST_FILE: Sift/Info.plist
    sources:
      - path: Sift
        excludes:
          - "**/.gitkeep"
    dependencies:
      - package: Supabase
    info:
      path: Sift/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Sift

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
